modLoader="javafml"
loaderVersion="${loader_version_range}"
issueTrackerURL="https://github.com/VerdeLake/SchematicVoid/issues"
license="${mod_license}"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    updateJSONURL="https://raw.githubusercontent.com/VerdeLake/SchematicVoid/refs/heads/main/mod_update.json"
    displayURL="https://modrinth.com/mod/schematicvoid"
    logoFile="schematicvoid.png"
    authors="VerdeLake"
    description="TEST - Pre-Release 2"

[[mixins]]
    config = "${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[6.0.10,6.1.0)"
    ordering="NONE"
    side="BOTH"
